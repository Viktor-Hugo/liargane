<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>라이어 게임 온라인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app">
      <header class="app-header">
        <p class="eyebrow">ONLINE ROOM</p>
        <h1>라이어 게임</h1>
        <p class="subtitle">방 링크를 공유하고 각자 휴대폰으로 접속하세요.</p>
      </header>

      <section class="card" id="entry-section">
        <h2>입장</h2>
        <div class="field-group">
          <label for="nickname">닉네임</label>
          <input id="nickname" type="text" placeholder="예: 민수" maxlength="16" />
        </div>

        <div class="field-group">
          <label for="room-id">방 코드 (참가자용)</label>
          <input id="room-id" type="text" placeholder="예: LIAR-4731" maxlength="16" />
        </div>

        <div class="entry-actions">
          <button class="primary" id="host-btn">방 만들기</button>
          <button class="secondary" id="join-btn">방 참가</button>
        </div>
        <p class="hint">같은 네트워크가 아니어도 접속 가능합니다.</p>
      </section>

      <section class="card hidden" id="lobby-section">
        <h2>대기실</h2>
        <p class="step-text" id="room-code-text"></p>
        <p class="step-text" id="share-link-text"></p>

        <div class="field-group host-only hidden" id="host-settings">
          <label for="category">카테고리</label>
          <select id="category">
            <option value="mix">랜덤 믹스</option>
            <option value="food">음식</option>
            <option value="job">직업</option>
            <option value="place">장소</option>
            <option value="object">사물</option>
            <option value="animal">동물</option>
          </select>

          <label for="timer-toggle" class="inline-label">토론 타이머 (3분)
            <input id="timer-toggle" type="checkbox" checked />
          </label>
        </div>

        <h3>참가자</h3>
        <div class="player-grid" id="player-list"></div>

        <button class="primary host-only hidden" id="start-btn">게임 시작</button>
      </section>

      <section class="card hidden" id="role-section">
        <h2>내 역할</h2>
        <div class="reveal-box active" id="my-role-box">호스트가 게임을 시작하면 표시됩니다.</div>
      </section>

      <section class="card hidden" id="discussion-section">
        <h2>토론 시간</h2>
        <p class="timer" id="timer-text">03:00</p>
        <p class="step-text" id="discussion-text">단서를 말하고 라이어를 추리하세요.</p>
        <button class="primary host-only hidden" id="go-vote-btn">투표 시작</button>
      </section>

      <section class="card hidden" id="vote-section">
        <h2>라이어 투표</h2>
        <p class="step-text">한 명을 선택하고 투표를 제출하세요.</p>
        <div class="player-grid" id="vote-grid"></div>
        <button class="primary" id="submit-vote-btn" disabled>내 투표 제출</button>
      </section>

      <section class="card hidden" id="liar-guess-section">
        <h2>라이어 최종 추리</h2>
        <p class="step-text" id="liar-guess-help"></p>
        <input id="liar-guess" type="text" placeholder="주제를 입력" />
        <button class="primary" id="submit-guess-btn">정답 제출</button>
      </section>

      <section class="card hidden" id="result-section">
        <h2>결과</h2>
        <p class="result-title" id="result-title"></p>
        <div class="result-meta">
          <p id="result-topic"></p>
          <p id="result-liar"></p>
          <p id="result-voted"></p>
        </div>
        <button class="primary host-only hidden" id="restart-btn">새 라운드</button>
      </section>

      <p class="status" id="status-text">연결 준비 중...</p>
    </main>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
